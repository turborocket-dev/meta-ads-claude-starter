[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meta-ads-mcp-codemode"
version = "1.0.0"
description = "Meta Marketing API MCP server with FastMCP Code Mode — auto-generated from Meta's official SDK specs"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Thales Laray" }]
keywords = ["meta-ads", "facebook-ads", "mcp", "fastmcp", "code-mode", "marketing-api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    # CVE-2026-32871 patched in 3.2.0; pin >=3.2.4 for defense-in-depth
    "fastmcp[code-mode]>=3.2.4",
    "httpx>=0.28.0",
    # Used by apps/instagram_dashboard.py
    "prefab-ui>=0.10.0",
]
# Note: streamlit removed (was not used by any tool).
# fastapi/uvicorn moved to dashboard's own requirements.txt.

[project.scripts]
meta-ads-mcp = "meta_ads_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/meta_ads_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "respx>=0.22"]
